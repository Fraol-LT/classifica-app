<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Classifica Live</title>
    <!-- Tailwind CSS per lo stile (caricato da CDN per non avere file extra) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome per le icone -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* Animazione per i nuovi elementi */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .player-row {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-800 pb-20">

    <!-- Header Fisso -->
    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-trophy text-yellow-300"></i> Classifica
            </h1>
            <button onclick="resetLeaderboard()" class="text-blue-200 hover:text-white transition" title="Azzera tutto">
                <i class="fa-solid fa-rotate-right"></i>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 mt-2">
        
        <!-- Form Aggiunta Giocatore -->
        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 border border-slate-200">
            <form id="add-player-form" class="flex gap-2">
                <input 
                    type="text" 
                    id="player-name" 
                    placeholder="Nome giocatore..." 
                    class="flex-1 bg-slate-100 border-none rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg"
                    required
                    autocomplete="off"
                >
                <button 
                    type="submit" 
                    class="bg-blue-600 text-white px-5 py-3 rounded-lg font-semibold hover:bg-blue-700 active:bg-blue-800 transition flex items-center gap-2 shadow-sm"
                >
                    <i class="fa-solid fa-plus"></i>
                </button>
            </form>
        </div>

        <!-- Lista Classifica -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <ul id="leaderboard-list" class="divide-y divide-slate-100">
                <!-- I giocatori verranno inseriti qui da JavaScript -->
            </ul>
            <div id="empty-state" class="p-8 text-center text-slate-400 hidden">
                <i class="fa-solid fa-users text-4xl mb-3 text-slate-300"></i>
                <p>Nessun giocatore presente.<br>Aggiungine uno per iniziare!</p>
            </div>
        </div>

    </main>

    <!-- JavaScript della Logica -->
    <script>
        // Carica i dati dalla memoria locale o inizia con un array vuoto
        let players = JSON.parse(localStorage.getItem('app_classifica_dati')) || [];

        // Elementi del DOM
        const form = document.getElementById('add-player-form');
        const inputName = document.getElementById('player-name');
        const leaderboardList = document.getElementById('leaderboard-list');
        const emptyState = document.getElementById('empty-state');

        // Funzione per salvare i dati
        function saveDati() {
            localStorage.setItem('app_classifica_dati', JSON.stringify(players));
        }

        // Funzione per aggiornare l'interfaccia
        function renderClassifica() {
            // 1. Ordina i giocatori per punteggio (dal più alto al più basso)
            players.sort((a, b) => b.score - a.score);

            // 2. Pulisce la lista
            leaderboardList.innerHTML = '';

            // 3. Mostra/nasconde il messaggio di stato vuoto
            if (players.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
            }

            // 4. Crea l'HTML per ogni giocatore
            players.forEach((player, index) => {
                const li = document.createElement('li');
                li.className = 'player-row p-4 flex items-center justify-between gap-3 transition-colors';
                
                // Stili per i primi 3
                let rankStyle = "bg-slate-100 text-slate-600 font-bold";
                let rankIcon = `${index + 1}°`;
                let rowBg = "";

                if (index === 0) {
                    rankStyle = "bg-yellow-100 text-yellow-600";
                    rankIcon = '<i class="fa-solid fa-crown text-yellow-500"></i>';
                    rowBg = "bg-yellow-50/30";
                } else if (index === 1) {
                    rankStyle = "bg-gray-200 text-gray-600";
                    rankIcon = '<i class="fa-solid fa-medal text-gray-400"></i>';
                    rowBg = "bg-gray-50/50";
                } else if (index === 2) {
                    rankStyle = "bg-orange-100 text-orange-700";
                    rankIcon = '<i class="fa-solid fa-medal text-orange-500"></i>';
                    rowBg = "bg-orange-50/30";
                }

                if(rowBg) li.classList.add(...rowBg.split(' '));

                li.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 overflow-hidden">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center text-lg shadow-sm ${rankStyle}">
                            ${rankIcon}
                        </div>
                        <div class="font-bold text-lg truncate">${player.name}</div>
                    </div>
                    
                    <div class="flex items-center gap-2">
                        <div class="font-black text-2xl w-12 text-center text-blue-600 mr-2">
                            ${player.score}
                        </div>
                        
                        <div class="flex flex-col sm:flex-row gap-1">
                            <button onclick="updateScore('${player.id}', -1)" class="w-10 h-10 rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 active:bg-slate-300 flex items-center justify-center text-xl transition">
                                <i class="fa-solid fa-minus text-sm"></i>
                            </button>
                            <button onclick="updateScore('${player.id}', 1)" class="w-10 h-10 rounded-lg bg-blue-100 text-blue-600 hover:bg-blue-200 active:bg-blue-300 flex items-center justify-center text-xl transition">
                                <i class="fa-solid fa-plus text-sm"></i>
                            </button>
                        </div>
                        
                        <button onclick="deletePlayer('${player.id}', '${player.name}')" class="w-10 h-10 ml-2 rounded-lg text-slate-300 hover:text-red-500 hover:bg-red-50 active:bg-red-100 flex items-center justify-center transition">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    </div>
                `;
                leaderboardList.appendChild(li);
            });
        }

        // Aggiungi un nuovo giocatore
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = inputName.value.trim();
            
            if (name) {
                const newPlayer = {
                    id: Date.now().toString(), // Genera un ID univoco
                    name: name,
                    score: 0
                };
                
                players.push(newPlayer);
                saveDati();
                renderClassifica();
                inputName.value = ''; // Svuota l'input
                inputName.focus();
            }
        });

        // Aggiorna il punteggio (+1 o -1)
        window.updateScore = function(id, pointsToAdd) {
            const playerIndex = players.findIndex(p => p.id === id);
            if (playerIndex !== -1) {
                players[playerIndex].score += pointsToAdd;
                saveDati();
                renderClassifica(); // Ridisegna la UI per mostrare l'ordinamento in tempo reale
            }
        }

        // Elimina un giocatore
        window.deletePlayer = function(id, name) {
            if (confirm(`Sei sicuro di voler eliminare ${name}?`)) {
                players = players.filter(p => p.id !== id);
                saveDati();
                renderClassifica();
            }
        }

        // Azzera tutto
        window.resetLeaderboard = function() {
            if (players.length === 0) return;
            if (confirm("Attenzione: Sei sicuro di voler eliminare TUTTI i giocatori e azzerare la classifica?")) {
                players = [];
                saveDati();
                renderClassifica();
            }
        }

        // Inizializzazione al caricamento della pagina
        renderClassifica();

    </script>
</body>
</html>
